name: Feature Request
description: Request a new feature
title: "[Feature]: "
labels: [enhancement]
assignees: []
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: "What feature would you like to see? Word limit: 120."
    validations:
      required: true

  - type: textarea
    id: why_this_helps
    attributes:
      label: Why this helps
      description: "What problem does this solve for you? Word limit: 200."
    validations:
      required: true

  - type: textarea
    id: ideal_outcome
    attributes:
      label: Ideal outcome
      description: "Describe what success looks like. Word limit: 200."
    validations:
      required: false

  - type: input
    id: release_version
    attributes:
      label: DataVis Release Version
      description: Auto-filled by the app when available.
      placeholder: v0.0.0
    validations:
      required: true
