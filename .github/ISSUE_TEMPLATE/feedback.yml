name: Feedback
description: General feedback on the release
title: "[Feedback]: "
labels: [feedback]
assignees: []
body:
  - type: dropdown
    id: rating
    attributes:
      label: Rating
      description: What would you rate this release?
      default: 2
      options:
        - 5 - Outstanding
        - 4 - Better than expected
        - 3 - As expected
        - 2 - Below expectations
        - 1 - Disappointing
    validations:
      required: true

  - type: textarea
    id: things_i_like
    attributes:
      label: Things I like
      description: What things do you like and why?
    validations:
      required: false

  - type: textarea
    id: how_to_improve
    attributes:
      label: How to improve
      description: Constructive ideas for how to improve this release.
    validations:
      required: true

  - type: input
    id: release_version
    attributes:
      label: DataVis Release Version
      description: Auto-filled by the app when available.
      placeholder: v0.0.0
    validations:
      required: true
