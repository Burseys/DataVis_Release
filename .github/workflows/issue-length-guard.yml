name: Issue Length Guard

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write

jobs:
  validate-issue-length:
    runs-on: ubuntu-latest
    env:
      MAX_TOTAL_CHARS: "6000"
      OVER_LIMIT_LABEL: "needs-trim"
      HEADING_LIMITS_JSON: >-
        {
          "What went wrong": 1200,
          "How to reproduce": 1500,
          "How I expect it to work": 1200,
          "Helpful screenshots or log files": 4000,
          "Things I like": 1200,
          "How to improve": 1500,
          "Summary": 800,
          "Why this helps": 1200,
          "Ideal outcome": 1200
        }
    steps:
      - name: Validate issue body length
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) {
              core.info('No issue payload found.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = issue.number;
            const body = issue.body || '';
            const marker = '<!-- issue-length-guard -->';
            const maxTotal = Number(process.env.MAX_TOTAL_CHARS || '6000');
            const overLimitLabel = process.env.OVER_LIMIT_LABEL || 'needs-trim';

            let headingLimits = {};
            try {
              headingLimits = JSON.parse(process.env.HEADING_LIMITS_JSON || '{}');
            } catch (err) {
              core.warning(`Invalid HEADING_LIMITS_JSON: ${err.message}`);
            }

            function parseSections(markdown) {
              const sections = {};
              let currentHeading = null;
              const lines = markdown.split(/\r?\n/);

              for (const line of lines) {
                const match = line.match(/^###\s+(.*)$/);
                if (match) {
                  currentHeading = match[1].trim();
                  sections[currentHeading] = [];
                  continue;
                }

                if (currentHeading) {
                  sections[currentHeading].push(line);
                }
              }

              const normalized = {};
              for (const [heading, contentLines] of Object.entries(sections)) {
                normalized[heading] = contentLines.join('\n').trim().length;
              }
              return normalized;
            }

            const violations = [];

            if (body.length > maxTotal) {
              violations.push(`- Issue body length ${body.length} exceeds max ${maxTotal}.`);
            }

            const sectionLengths = parseSections(body);
            for (const [heading, limit] of Object.entries(headingLimits)) {
              const len = sectionLengths[heading] || 0;
              if (len > Number(limit)) {
                violations.push(`- Section "${heading}" length ${len} exceeds max ${limit}.`);
              }
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100
            });

            const existingBotComment = comments.find(c =>
              c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker)
            );

            const labels = issue.labels.map(l => (typeof l === 'string' ? l : l.name));
            const hasOverLimitLabel = labels.includes(overLimitLabel);

            if (violations.length === 0) {
              if (existingBotComment) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: existingBotComment.id
                });
              }

              if (hasOverLimitLabel) {
                try {
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    name: overLimitLabel
                  });
                } catch (err) {
                  core.info(`Could not remove label ${overLimitLabel}: ${err.message}`);
                }
              }

              core.info('Issue is within configured character limits.');
              return;
            }

            const message = [
              marker,
              '### Issue is over the configured character limit',
              '',
              'Please shorten the issue text so triage remains readable.',
              '',
              ...violations,
              '',
              `Current total length: ${body.length} characters.`
            ].join('\n');

            if (existingBotComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingBotComment.id,
                body: message
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: message
              });
            }

            if (!hasOverLimitLabel) {
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  labels: [overLimitLabel]
                });
              } catch (err) {
                core.info(`Could not add label ${overLimitLabel}: ${err.message}`);
              }
            }

            core.setFailed('Issue exceeds configured character limits.');
